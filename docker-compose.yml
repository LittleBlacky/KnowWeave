services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowweave}
      POSTGRES_USER: ${POSTGRES_USER:-knowweave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowweave}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-knowweave} -d $${POSTGRES_DB:-knowweave}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-knowweave}:${POSTGRES_PASSWORD:-knowweave}@postgres:5432/${POSTGRES_DB:-knowweave}
      FILE_STORAGE_ROOT: /app/data/files
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_CHAT_MODEL: ${QWEN_CHAT_MODEL:-qwen-plus}
      QWEN_GENERATION_MODEL: ${QWEN_GENERATION_MODEL:-qwen-plus}
      QWEN_TIMEOUT_SECONDS: ${QWEN_TIMEOUT_SECONDS:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:4317,http://127.0.0.1:4317}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./data/files:/app/data/files
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
      NEXT_PUBLIC_ENABLE_MOCKS: ${NEXT_PUBLIC_ENABLE_MOCKS:-false}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
